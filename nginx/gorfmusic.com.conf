# Nginx vhost for gorfmusic.com
# On server: copy to /etc/nginx/vhosts.d/gorfmusic.com.conf (or include from main nginx.conf).
#
# Docroot must be the folder that receives `dist/` from deploy (index.html, music.html, services.html, live.html, contact.html, assets/, robots.txt).
# Default below matches a typical Linux mount: /data/websites/gorfmusic.com
# If your tree differs, change only `root` here (or symlink that path → this directory).
#
# HTTP 301 to HTTPS on port 80 is intentional — it does not break the site; ensure TLS works and `root` is correct.
# After editing: nginx -t && systemctl reload nginx
# SSL cert: certbot certonly --nginx -d gorfmusic.com -d www.gorfmusic.com (if using Let's Encrypt)

# HTTP — redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gorfmusic.com www.gorfmusic.com;

    # Let's Encrypt ACME challenge (for certbot)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gorfmusic.com www.gorfmusic.com;

    # Same directory the SMB share / rsync target uses (contains index.html from Vite build)
    root /data/websites/gorfmusic.com;
    index index.html;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/gorfmusic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gorfmusic.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Logging
    access_log /var/log/nginx/gorfmusic.com.access.log main;
    error_log /var/log/nginx/gorfmusic.com.error.log warn;

    # Security headers (CSP tuned for this SPA: Vite bundle, Google Fonts, Unsplash images)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; frame-src 'none'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://api.web3forms.com; upgrade-insecure-requests;" always;

    # Canonicalize legacy HTML and slash variants for top-level page routes.
    location = /index.html {
        return 301 https://$host/;
    }

    location = /music.html {
        return 301 https://$host/listen$is_args$args;
    }

    location ~ ^/(listen|live|collaborations|services|contact)\.html$ {
        return 301 https://$host/$1$is_args$args;
    }

    location = /music/ {
        return 301 https://$host/listen$is_args$args;
    }

    location = /music {
        return 301 https://$host/listen$is_args$args;
    }

    location ~ ^/(listen|live|collaborations|services|contact)/$ {
        return 301 https://$host/$1$is_args$args;
    }

    # Static asset caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|otf|woff2?|webp|xml|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Extensionless page resolution:
    # 1) real files/dirs (+ index.html in dirs)
    # 2) root *.html shells (e.g. /live → live.html)
    # 3) named fallback — never use bare /index.html in try_files (redirect loop on /)
    location / {
        try_files $uri $uri/ $uri.html @spa_fallback;
    }

    location @spa_fallback {
        rewrite ^/(listen|live|collaborations|services|contact)$ /$1/index.html break;
        rewrite ^ /index.html break;
    }

    # Deny hidden and sensitive files
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~* \.(env|log|key|pem|lock|md|json|map)$ { deny all; access_log off; log_not_found off; }

    client_max_body_size 10M;
    server_tokens off;
}
